name: Deploy frontend
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run tests
        run: |
          docker build -t dockwall/vite-react-docker-test -f Dockerfile.dev .
          docker run -e CI=true dockwall/vite-react-docker-test npm run test -- run

      - name: Generate deployment package
        run: zip -r deploy.zip . -x '*.git*'

      - name: Copy deployment package
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_DOMAIN }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "deploy.zip"
          target: ${{ secrets.VPS_APP_PATH }}

      - name: Build project image and run a container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_DOMAIN }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.VPS_APP_PATH }}
            unzip -o deploy.zip
            rm deploy.zip
